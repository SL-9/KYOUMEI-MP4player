<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>響鳴-Kyoumei- MP4 Player</title>
  <meta name="description" content="A cinematic MP4 music player with immersive visual experience. Play, discover, and feel your music." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Background Layer -->
  <div class="bg-layer" id="bgLayer"></div>
  <div class="bg-gradient-overlay"></div>
  <canvas id="particleCanvas"></canvas>

  <!-- App Container -->
  <div class="app-container">

    <!-- Header -->
    <header class="app-header" id="appHeader">
      <div class="header-left">
        <a href="https://kyoumei.vercel.app/" target="_blank" rel="noopener noreferrer" class="logo" aria-label="Kyoumei ポータルへ">
          <div class="logo-icon logo-icon-img">
            <img src="logo.jpg" alt="Kyoumei" class="logo-img" />
          </div>
          <span class="logo-text">響鳴-Kyoumei-<span class="logo-text-sub"> MP4 Player</span></span>
        </a>
      </div>
      <nav class="header-nav">
        <a href="#" class="nav-link active">Collection</a>
        <a href="#" class="nav-link">Library</a>
      </nav>
      <div class="header-right">
        <div class="search-bar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" placeholder="Search tracks…" id="searchInput" aria-label="Search tracks" />
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">

      <!-- Hero Section -->
      <section class="hero-section" id="heroSection" aria-label="Featured track hero">
        <div class="hero-text">
          <p class="hero-eyebrow">Now Trending</p>
          <h1 class="hero-title" id="heroTitle">Discover<br/><span class="gradient-text">Cinematic Sound</span></h1>
          <p class="hero-subtitle" id="heroSubtitle">Immerse yourself in visual music experiences</p>
          <button class="hero-btn" id="heroPlayBtn" aria-label="Play featured track">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>
            Play Featured
          </button>
        </div>
        <div class="hero-visual-container">
          <!-- Aspect Ratio Switcher -->
          <div class="aspect-switcher" role="group" aria-label="アスペクト比切り替え">
            <button class="aspect-btn" id="aspectLandscape" data-aspect="landscape" title="横長 (1920×1080)" aria-pressed="false">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="5" width="20" height="14" rx="2"/>
              </svg>
              <span>16:9</span>
            </button>
            <button class="aspect-btn active" id="aspectSquare" data-aspect="square" title="正方形 (1:1)" aria-pressed="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
              </svg>
              <span>1:1</span>
            </button>
            <button class="aspect-btn" id="aspectPortrait" data-aspect="portrait" title="縦長 (1080×1920)" aria-pressed="false">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="5" y="2" width="14" height="20" rx="2"/>
              </svg>
              <span>9:16</span>
            </button>
          </div>
          <div class="hero-visual aspect-square" id="heroVisual">
            <div class="hero-video-wrapper" id="heroVideoWrapper">
              <video id="heroVideo" muted loop playsinline class="hero-video">
                <source src="" type="video/mp4" />
              </video>
              <div class="hero-video-overlay">
                <!-- フルスクリーンボタン -->
                <button class="hero-fs-btn" id="heroFsBtn" aria-label="フルスクリーン表示" title="フルスクリーン">
                  <svg class="hero-fs-icon-expand" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
                  </svg>
                  <svg class="hero-fs-icon-compress" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none">
                    <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Genre Tags -->
      <section class="genre-section" aria-label="Genre filter">
        <div class="genre-tags" id="genreTags" role="list">
          <button class="genre-tag active" data-genre="all" role="listitem">All</button>
        </div>
      </section>

      <!-- Gallery Section -->
      <section class="gallery-section" aria-label="Track gallery">
        <div class="section-header">
          <h2 class="section-title">Featured Tracks</h2>
          <span class="section-count" id="trackCount">0 tracks</span>
        </div>

        <!-- Skeleton Loaders -->
        <div class="track-grid" id="skeletonGrid" aria-hidden="true">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>

        <!-- Track Gallery -->
        <div class="track-grid" id="trackGrid" aria-label="Track list"></div>
      </section>
    </main>
  </div>
  <!-- Main UI Content -->
  <!-- Now Playing Bar -->
  <div class="player-bar" id="playerBar" aria-label="Now playing" role="region">
    <div class="player-bar-inner">

      <!-- Track Info -->
      <div class="player-track-info">
        <div class="player-thumb-wrapper">
          <video id="playerThumb" muted loop playsinline class="player-thumb"></video>
          <div class="player-thumb-overlay">
            <div class="mini-visualizer" id="miniViz">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
          </div>
        </div>
        <div class="player-meta">
          <span class="player-title" id="playerTitle">Select a track</span>
          <span class="player-artist" id="playerArtist">—</span>
        </div>
        <button class="heart-btn" id="heartBtn" aria-label="Like track">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </button>
      </div>

      <!-- Main Controls -->
      <div class="player-controls-center">
        <div class="control-buttons">
          <button class="ctrl-btn" id="shuffleBtn" aria-label="Shuffle" title="Shuffle">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
              <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
            </svg>
          </button>
          <button class="ctrl-btn" id="prevBtn" aria-label="Previous track">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
            </svg>
          </button>
          <button class="play-btn" id="playBtn" aria-label="Play or pause">
            <svg class="icon-play" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>
            <svg class="icon-pause" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <button class="ctrl-btn" id="nextBtn" aria-label="Next track">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 18l8.5-6L6 6v12zm2.5-6 6-4.5v9L8.5 12zM16 6h2v12h-2z"/>
            </svg>
          </button>
          <button class="ctrl-btn" id="loopBtn" aria-label="Toggle loop" title="Loop">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
              <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
            </svg>
          </button>
        </div>

        <!-- Progress Bar -->
        <div class="progress-section">
          <span class="time-label" id="currentTime">0:00</span>
          <div class="progress-track" id="progressTrack" role="slider" aria-label="Seek" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
            <div class="progress-fill" id="progressFill"></div>
            <div class="progress-thumb" id="progressThumb"></div>
            <div class="progress-buffer" id="progressBuffer"></div>
          </div>
          <span class="time-label" id="totalTime">0:00</span>
        </div>
      </div>

      <!-- Right Controls -->
      <div class="player-controls-right">
        <button class="ctrl-btn" id="muteBtn" aria-label="Toggle mute">
          <svg class="icon-vol" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
          <svg class="icon-mute" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
          </svg>
        </button>
        <div class="volume-slider-wrap">
          <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80" aria-label="Volume" />
        </div>
        <button class="ctrl-btn" id="fullscreenBtn" aria-label="Fullscreen video" title="Fullscreen">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
          </svg>
        </button>
      </div>

    </div>

    <!-- Waveform Visualizer Strip -->
    <canvas class="waveform-canvas" id="waveformCanvas" aria-hidden="true"></canvas>
  </div>

  <!-- フルスクリーンモーダルは廃止 (heroVideoWrapperを使用したネイティブフルスクリーンに移行) -->

  <script src="app.js"></script>
</body>
</html>
